<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Comparador de Precios con Carrito</title>
  
  <!-- Servidor CDN de Cloudflare: Más rápido y estable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" type="text/javascript"></script>
  
  <style>
    body { font-family: Arial, sans-serif; text-align: center; }
    input { padding: 10px; font-size: 16px; margin: 10px; width: 250px; }
    button { padding: 10px 20px; font-size: 16px; background: #3498db; color: white; border: none; border-radius: 5px; margin: 5px; cursor: pointer; }
    button:hover { background: #2980b9; }
    button:disabled { background: #95a5a6; cursor: not-allowed; }
    table { margin: 20px auto; border-collapse: collapse; width: 90%; background: #fff; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    th { background-color: #3498db; color: white; }
    #carrito { font-size: 20px; font-weight: bold; margin: 15px; color: #2c3e50; }
    .oculto { display: none; }
    
    #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 8px; background: #000; display: none; }
    .manual-box {
      margin: 15px auto;
      padding: 10px;
      width: 100%;
      max-width: 380px;
      border: 1px dashed #7f8c8d;
      border-radius: 5px;
      background: #f8f9fa;
      box-sizing: border-box;
    }
    #status { font-size: 14px; color: #7f8c8d; margin-top: 5px; }

    /* Estilos para alinear los botones uno sobre otro */
    .botones-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
      margin-bottom: 30px;
    }
    .botones-container input[type="file"] {
      width: auto;
      margin: 0;
    }
    .botones-container button {
      width: 250px; /* Ancho uniforme para que se vean ordenados */
    }
  </style>
</head>
<body onload="verificarLibreria()">
  <h2>Comparador de Precios</h2>
  
  <div id="carrito">🛒 Total carrito: $0.00</div>
  
  <button onclick="toggleLista()">👁️ Mostrar / Ocultar lista de compras</button>
  
  <div id="contenedorLista" class="oculto">
    <table id="detalleCarrito">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Precio unitario</th>
          <th>Subtotal</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
 
  <p>Escanea el código de barras</p>
  
  <!-- El botón inicia bloqueado y cambia de color hasta que la librería responda -->
  <button id="btnStart" onclick="encender()" disabled>⏳ Cargando cámara...</button>
  <div id="status">Por favor, espera a que el botón se active</div>
  
  <div id="reader"></div>

  <div class="manual-box">
    <p style="margin: 5px; font-size: 14px; color: #555;">Si la cámara no enciende o falla, escribe aquí:</p>
    <input type="text" id="codigoManual" placeholder="Escribe el código a mano">
    <button onclick="buscarManual()">Buscar manual</button>
  </div>

  <div id="resultado"></div>
 
  <h3>Respaldo de la base</h3>

  <!-- Div contenedor para alinear los botones -->
  <div class="botones-container">
    <button onclick="exportarCSV()">Exportar base a CSV</button>
    <input type="file" id="archivoCSV" accept=".csv">
    <button onclick="importarCSV()">Importar base desde CSV</button>
    <button onclick="resetCarrito()" style="background-color: #e74c3c;">🔄 Restablecer carrito</button>
  </div>
 
  <script>
    let productos = JSON.parse(localStorage.getItem("productos")) || {
      "7501234567890": { nombre: "Coca-Cola", presentacion: "500 ml", precioAnterior: 18.00 },
      "7509876543210": { nombre: "Cerveza", presentacion: "1.2 L", precioAnterior: 35.00 }
    };
 
    let totalCarrito = 0;
    let detalle = [];
    let scanner = null; 
 
    function guardarLocal() {
      localStorage.setItem("productos", JSON.stringify(productos));
    }

    function toggleLista() {
      let lista = document.getElementById("contenedorLista");
      lista.classList.toggle("oculto");
    }
 
    function actualizarCarrito() {
      document.getElementById("carrito").textContent = `🛒 Total carrito: $${totalCarrito.toFixed(2)}`;
      let tbody = document.querySelector("#detalleCarrito tbody");
      tbody.innerHTML = "";
      detalle.forEach(item => {
        tbody.innerHTML += `
          <tr>
            <td>${item.nombre}</td>
            <td>${item.cantidad}</td>
            <td>$${item.precio.toFixed(2)}</td>
            <td>$${item.subtotal.toFixed(2)}</td>
          </tr>
        `;
      });
    }

    // Monitorea que la librería se cargue en memoria de forma real
    function verificarLibreria() {
      const btnStart = document.getElementById('btnStart');
      const statusText = document.getElementById('status');
      
      if (typeof Html5Qrcode !== "undefined") {
        btnStart.disabled = false;
        btnStart.innerText = "Encender Cámara";
        btnStart.style.background = "#2ecc71"; // Verde llamativo
        statusText.innerText = "Librería cargada. Listo para escanear.";
        statusText.style.color = "#27ae60";
      } else {
        // Si no ha cargado, vuelve a verificar en medio segundo
        setTimeout(verificarLibreria, 500);
      }
    }

    function encender() {
      const btnStart = document.getElementById('btnStart');
      const readerDiv = document.getElementById('reader');

      btnStart.style.display = 'none';
      readerDiv.style.display = 'block';

      scanner = new Html5Qrcode("reader");
      const config = { fps: 10, qrbox: { width: 250, height: 150 } };

      scanner.start({ facingMode: "environment" }, config, (text) => {
        scanner.stop().then(() => {
          scanner.clear();
          readerDiv.style.display = 'none';
          btnStart.style.display = 'block';
          btnStart.innerText = "Escanear otro producto";
          buscarProducto(text);
        });
        
        if (navigator.vibrate) navigator.vibrate(100);
      }).catch(err => {
        alert("Error de cámara: " + err);
        btnStart.style.display = 'block';
      });
    }

    function buscarManual() {
      let codigo = document.getElementById("codigoManual").value.trim();
      if (!codigo) {
        alert("Por favor ingresa un código de barras.");
        return;
      }
      buscarProducto(codigo);
      document.getElementById("codigoManual").value = ""; 
    }
 
    function buscarProducto(codigo) {
      let contenedor = document.getElementById("resultado");
 
      if (productos[codigo]) {
        let p = productos[codigo];
        contenedor.innerHTML = `
          <h3>${p.nombre} - ${p.presentacion}</h3>
          <p>Precio anterior: $${p.precioAnterior.toFixed(2)}</p>
          <input type="number" id="precioActual" placeholder="Ingresa precio actual" step="0.01">
          <button onclick="comparar('${codigo}')">Comparar</button>
        `;
      } else {
        contenedor.innerHTML = `
          <h3>Producto no registrado (${codigo})</h3>
          <p>Ingresa los datos para guardarlo en la base de datos:</p>
          <input type="text" id="nombre" placeholder="Nombre"><br>
          <input type="text" id="presentacion" placeholder="Presentación"><br>
          <input type="number" id="precioNuevo" placeholder="Precio actual" step="0.01"><br>
          <button onclick="guardarNuevoProducto('${codigo}')">Guardar en la base de datos</button>
        `;
      }
    }
 
    function comparar(codigo) {
      let inputPrecio = document.getElementById("precioActual").value;
      let precioActual = parseFloat(inputPrecio);
      
      if (!inputPrecio || isNaN(precioActual) || precioActual < 0) {
        alert("Por favor ingresa un precio actual válido.");
        return;
      }
 
      let p = productos[codigo];
      let diferencia = precioActual - p.precioAnterior;
      let porcentaje = ((diferencia / p.precioAnterior) * 100).toFixed(2);
 
      // 🚀 MODIFICACIÓN AQUÍ: Se añade una pregunta por piezas antes de procesar el carrito
      document.getElementById("resultado").innerHTML = `
        <h3>${p.nombre} - ${p.presentacion}</h3>
        <table>
          <tr>
            <th>Precio anterior</th>
            <th>Precio actual</th>
            <th>Diferencia</th>
          </tr>
          <tr>
            <td>$${p.precioAnterior.toFixed(2)}</td>
            <td>$${precioActual.toFixed(2)}</td>
            <td>$${diferencia.toFixed(2)} (${porcentaje}%)</td>
          </tr>
        </table>
        
        <div style="margin: 15px 0;">
          <label style="font-weight: bold;">¿Cuántas piezas llevarás?: </label>
          <input type="number" id="cantidadCarrito" value="1" min="1" style="width: 80px; margin: 0 5px;">
        </div>
        
        <button onclick="procesarCarrito('${codigo}', '${p.nombre}', ${precioActual})">➕ Agregar al carrito</button>
      `;
 
      productos[codigo].precioAnterior = precioActual;
      guardarLocal();
    }

    // 🚀 MODIFICACIÓN AQUÍ: Función que lee las piezas digitadas
    function procesarCarrito(codigo, nombre, precio) {
      let cantInput = document.getElementById("cantidadCarrito").value;
      let cantidad = parseInt(cantInput);

      if (isNaN(cantidad) || cantidad < 1) {
        alert("Por favor ingresa una cantidad válida de piezas.");
        return;
      }

      agregarCarrito(codigo, nombre, precio, cantidad);
    }

    function guardarNuevoProducto(codigo) {
      let nombre = document.getElementById("nombre").value.trim();
      let presentacion = document.getElementById("presentacion").value.trim();
      let precioNuevo = parseFloat(document.getElementById("precioNuevo").value);

      if (!nombre || !presentacion || isNaN(precioNuevo) || precioNuevo < 0) {
        alert("Por favor llena todos los campos correctamente.");
        return;
      }

      productos[codigo] = { nombre, presentacion, precioAnterior: precioNuevo };
      guardarLocal();
      alert("¡Producto guardado exitosamente!");
      buscarProducto(codigo);
    }

    // 🚀 MODIFICACIÓN AQUÍ: Ahora la función recibe cuántas piezas compras
    function agregarCarrito(codigo, nombre, precio, cantidad) {
      let item = detalle.find(i => i.codigo === codigo);
      let subtotalSumado = precio * cantidad;

      if (item) {
        item.cantidad += cantidad;
        item.subtotal = item.cantidad * item.precio;
      } else {
        detalle.push({ codigo, nombre, precio, cantidad: cantidad, subtotal: subtotalSumado });
      }
      totalCarrito += subtotalSumado;
      actualizarCarrito();
      alert(`${cantidad} pieza(s) de ${nombre} agregada(s) al carrito.`);
      document.getElementById("resultado").innerHTML = "";
    }

    function resetCarrito() {
      totalCarrito = 0;
      detalle = [];
      actualizarCarrito();
      alert("Carrito restablecido.");
    }

    // Funciones "Dummy" temporales para evitar fallos (No escritas en tu versión compartida)
    function exportarCSV() { alert("Función de exportar CSV no escrita aún."); }
    function importarCSV() { alert("Función de importar CSV no escrita aún."); }
  </script>
</body>
</html>
