<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparador de Precios con Carrito</title>
  
  <!-- 📷 Librería para escanear Códigos QR y de Barras -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f6f9; color: #333; }
    h2, h3 { color: #2c3e50; }
    
    /* Inputs y Botones Adaptables a Pantallas */
    input, select { padding: 15px; font-size: 16px; margin: 10px; width: 85%; max-width: 350px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
    button { padding: 15px 20px; font-size: 16px; background: #3498db; color: white; border: none; border-radius: 5px; margin: 5px auto; cursor: pointer; width: 85%; max-width: 350px; display: block; font-weight: bold; }
    button:hover { background: #2980b9; }
    
    /* Botones secundarios más pequeños en tablas */
    .btn-rojo { background-color: #e74c3c; padding: 6px 12px; font-size: 14px; width: auto; display: inline-block; margin: 0; }
    .btn-rojo:hover { background-color: #c0392b; }
    .btn-naranja { background-color: #e67e22; }
    .btn-naranja:hover { background-color: #d35400; }
    
    /* Sección del Carrito */
    #carrito { font-size: 24px; font-weight: bold; margin: 20px; color: #2c3e50; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 85%; max-width: 350px; margin: 15px auto; }
    .oculto { display: none; }
    
    /* Tablas */
    table { margin: 20px auto; border-collapse: collapse; width: 95%; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
    th { background-color: #3498db; color: white; }
    
    /* Caja de búsqueda simulada */
    .simulador-box {
      margin: 15px auto;
      padding: 15px;
      width: 85%;
      max-width: 350px;
      border: 2px dashed #7f8c8d;
      border-radius: 8px;
      background: #fff;
      box-sizing: border-box;
      position: relative;
    }
    
    /* Estilos para la lista desplegable de sugerencias */
    .lista-sugerencias {
      position: absolute;
      top: 100%;
      left: 7.5%;
      width: 85%;
      background: white;
      border: 1px solid #ccc;
      border-top: none;
      border-radius: 0 0 5px 5px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      z-index: 10;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
    .sugerencia-item {
      padding: 12px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }
    .sugerencia-item:hover { background-color: #f1f1f1; }
    .sugerencia-item:last-child { border-bottom: none; }
    
    /* Contenedor de botones de respaldo */
    .botones-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
      margin-bottom: 30px;
    }
    .botones-container input[type="file"] { width: 85%; max-width: 350px; padding: 10px; margin: 0; }
    .botones-container button { width: 85%; max-width: 350px; }

    /* 📷 Estilos del Lector de Cámara */
    #lector-qr {
      width: 100%;
      max-width: 350px;
      margin: 10px auto;
      border-radius: 8px;
      overflow: hidden;
      display: none;
    }
    .btn-camara {
      background-color: #2ecc71;
    }
    .btn-camara:hover {
      background-color: #27ae60;
    }
  </style>
</head>
<body onload="cargarTodo()">

  <h2>Comparador de Precios</h2>
  
  <!-- TOTAL DEL CARRITO -->
  <div id="carrito">🛒 Total carrito: $0.00</div>
  
  <button onclick="toggleLista()">Mostrar / Ocultar lista</button>
  
  <!-- LISTA DETALLADA DEL CARRITO -->
  <div id="contenedorLista" class="oculto">
    <table id="detalleCarrito">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cant.</th>
          <th>Precio</th>
          <th>Subtotal</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
 
  <!-- 🔍 BUSCADOR DE PRODUCTOS (CÓDIGO O NOMBRE) -->
  <div class="simulador-box">
    <p style="margin: 5px; font-size: 16px; font-weight: bold; color: #555;">Escribe el código, nombre o escanea:</p>
    
    <input type="text" id="codigoManual" placeholder="Ej: Coca o 7501234..." oninput="filtrarNombres()" autocomplete="off">
    
    <div id="listaSugerencias" class="lista-sugerencias"></div>
    
    <!-- 📷 Lector de cámara oculto inicialmente -->
    <div id="lector-qr"></div>
    
    <button class="btn-camara" id="btnToggleCamara" onclick="toggleCamara()">📷 Abrir Cámara</button>
    <button onclick="buscarManual()">🔍 Buscar / Seleccionar</button>
  </div>

  <!-- AREA DE RESULTADOS -->
  <div id="resultado"></div>
 
  <h3>Respaldo de la base</h3>

  <!-- BOTONES DE RESPALDO -->
  <div class="botones-container">
    <button onclick="exportarCSV()">📤 Exportar base a CSV</button>
    <input type="file" id="archivoCSV" accept=".csv">
    <button onclick="importarCSV()">📥 Importar base desde CSV</button>
    <button onclick="resetCarrito()" style="background-color: #e74c3c;">🔄 Restablecer carrito</button>
  </div>
 
  <script>
    let productos = JSON.parse(localStorage.getItem("productos")) || {
      "75004699": { nombre: "Coca-Cola Retornable", presentacion: "500 ml", precioAnterior: 17.00, tienda: "Aurrera" },
      "7509876543210": { nombre: "Cerveza", presentacion: "1.2 L", precioAnterior: 35.00, tienda: "Walmart" }
    };
 
    let totalCarrito = parseFloat(localStorage.getItem("totalCarrito")) || 0;
    let detalle = JSON.parse(localStorage.getItem("detalleCarrito")) || [];
    
    // 📷 Variable para controlar el lector de cámara
    let html5QrCode = null;
 
    function guardarLocal() {
      localStorage.setItem("productos", JSON.stringify(productos));
    }

    function guardarCarritoLocal() {
      localStorage.setItem("totalCarrito", totalCarrito);
      localStorage.setItem("detalleCarrito", JSON.stringify(detalle));
    }

    function cargarTodo() {
      actualizarCarrito();
    }

    function toggleLista() {
      let lista = document.getElementById("contenedorLista");
      lista.classList.toggle("oculto");
    }
 
    function actualizarCarrito() {
      document.getElementById("carrito").textContent = `🛒 Total carrito: $${totalCarrito.toFixed(2)}`;
      let tbody = document.querySelector("#detalleCarrito tbody");
      tbody.innerHTML = "";
      detalle.forEach((item, index) => {
        tbody.innerHTML += `
          <tr>
            <td>${item.nombre}</td>
            <td>${item.cantidad}</td>
            <td>$${item.precio.toFixed(2)}</td>
            <td>$${item.subtotal.toFixed(2)}</td>
            <td><button class="btn-rojo" onclick="borrarItemDelCarrito(${index})">X</button></td>
          </tr>
        `;
      });
    }

    function borrarItemDelCarrito(index) {
      if (confirm(`¿Estás seguro de quitar "${detalle[index].nombre}" de la lista?`)) {
        totalCarrito -= detalle[index].subtotal;
        detalle.splice(index, 1); 
        
        actualizarCarrito();
        guardarCarritoLocal();
      }
    }

    function filtrarNombres() {
      let input = document.getElementById("codigoManual").value.trim().toLowerCase();
      let listaDiv = document.getElementById("listaSugerencias");
      
      if (!input) {
        listaDiv.style.display = "none";
        return;
      }

      listaDiv.innerHTML = "";
      let coincidencias = 0;

      for (const codigo in productos) {
        let p = productos[codigo];
        if (p.nombre.toLowerCase().includes(input) || codigo.includes(input)) {
          coincidencias++;
          let item = document.createElement("div");
          item.className = "sugerencia-item";
          item.innerHTML = `<strong>${p.nombre}</strong> - ${p.presentacion} <br><small style="color:#7f8c8d;">Código: ${codigo}</small>`;
          
          item.onclick = function() {
            document.getElementById("codigoManual").value = codigo;
            listaDiv.style.display = "none";
            buscarProducto(codigo);
          };
          listaDiv.appendChild(item);
        }
      }

      if (coincidencias > 0) {
        listaDiv.style.display = "block";
      } else {
        listaDiv.style.display = "none";
      }
    }

    function buscarManual() {
      let input = document.getElementById("codigoManual").value.trim();
      let listaDiv = document.getElementById("listaSugerencias");
      listaDiv.style.display = "none";

      if (!input) {
        alert("Por favor ingresa un código de barras o el nombre del producto.");
        return;
      }
      
      buscarProducto(input);
      document.getElementById("codigoManual").value = ""; 
    }
 
    function buscarProducto(codigo) {
      let contenedor = document.getElementById("resultado");
 
      if (productos[codigo]) {
        let p = productos[codigo];
        contenedor.innerHTML = `
          <h3>${p.nombre} - ${p.presentacion}</h3>
          <p style="font-weight: bold; font-size: 16px;">Precio guardado: $${p.precioAnterior.toFixed(2)} (${p.tienda || 'Sin tienda'})</p>
          
          <select id="tiendaActual">
            <option value="Aurrera">Aurrera</option>
            <option value="Walmart">Walmart</option>
            <option value="Zorro Abarrotero">Zorro Abarrotero</option>
          </select>
          <br>
          <input type="number" id="precioActual" placeholder="Ingresa precio en tienda hoy" step="0.01">
          
          <button onclick="comparar('${codigo}')">⚖️ Comparar</button>
          <button class="btn-rojo btn-naranja" onclick="borrarDeBaseDatos('${codigo}')">🗑️ Eliminar de la base</button>
        `;
      } else {
        contenedor.innerHTML = `
          <h3>Producto no registrado (${codigo})</h3>
          <p>Ingresa los datos para guardarlo en la base de datos:</p>
          <input type="text" id="nombre" placeholder="Nombre (Ej: Leche)"><br>
          <input type="text" id="presentacion" placeholder="Presentación (Ej: 1 Litro)"><br>
          
          <select id="tiendaNueva">
            <option value="Aurrera">Aurrera</option>
            <option value="Walmart">Walmart</option>
            <option value="Zorro Abarrotero">Zorro Abarrotero</option>
          </select>
          <br>
          <input type="number" id="precioNuevo" placeholder="Precio actual" step="0.01"><br>
          <button onclick="guardarNuevoProducto('${codigo}')">💾 Guardar en la base de datos</button>
        `;
      }
    }

    function borrarDeBaseDatos(codigo) {
      let nombre = productos[codigo].nombre;
      if (confirm(`¿Estás seguro de que quieres eliminar "${nombre}" de la base de datos?`)) {
        delete productos[codigo];
        guardarLocal();
        alert(`"${nombre}" ha sido borrado exitosamente.`);
        document.getElementById("resultado").innerHTML = "";
      }
    }
 
    function comparar(codigo) {
      let inputPrecio = document.getElementById("precioActual").value.trim();
      let inputTienda = document.getElementById("tiendaActual").value;
      let p = productos[codigo];
      let precioActual;
      
      if (inputPrecio === "") {
        precioActual = p.precioAnterior;
      } else {
        precioActual = parseFloat(inputPrecio);
      }
      
      if (isNaN(precioActual) || precioActual < 0) {
        alert("Por favor ingresa un precio actual válido.");
        return;
      }
 
      let diferencia = precioActual - p.precioAnterior;
      let porcentaje = ((diferencia / p.precioAnterior) * 100).toFixed(2);
 
      document.getElementById("resultado").innerHTML = `
        <h3>${p.nombre} - ${p.presentacion}</h3>
        <table>
          <tr>
            <th>P. Ant. (${p.tienda || 'Base'})</th>
            <th>P. Act. (${inputTienda})</th>
            <th>Dif.</th>
          </tr>
          <tr>
            <td>$${p.precioAnterior.toFixed(2)}</td>
            <td>$${precioActual.toFixed(2)}</td>
            <td>$${diferencia.toFixed(2)} (${porcentaje}%)</td>
          </tr>
        </table>
        
        <button onclick="preguntarYAgregar('${codigo}', '${p.nombre}', ${precioActual}, '${inputTienda}')">➕ Agregar al carrito</button>
      `;
 
      productos[codigo].precioAnterior = precioActual;
      productos[codigo].tienda = inputTienda;
      guardarLocal();
    }

    function preguntarYAgregar(codigo, nombre, precio, tienda) {
      let cantPrompt = prompt(`¿Cuántas piezas de "${nombre}" llevarás?`, "1");
      
      if (cantPrompt === null) return; 
      
      let cantidad = parseInt(cantPrompt);
      
      if (isNaN(cantidad) || cantidad < 1) {
        alert("Por favor ingresa una cantidad válida de piezas.");
        return;
      }
      
      let item = detalle.find(i => i.codigo === codigo && i.tienda === tienda);
      let subtotalSumado = precio * cantidad;

      if (item) {
        item.cantidad += cantidad;
        item.subtotal = item.cantidad * item.precio;
      } else {
        detalle.push({ codigo, nombre, precio, cantidad: cantidad, subtotal: subtotalSumado, tienda: tienda });
      }
      
      totalCarrito += subtotalSumado;
      
      actualizarCarrito();
      guardarCarritoLocal();
      
      alert(`¡Éxito! Agregaste ${cantidad} pieza(s) de ${nombre}.`);
      document.getElementById("resultado").innerHTML = ""; 
    }

    function guardarNuevoProducto(codigo) {
      let nombre = document.getElementById("nombre").value.trim();
      let presentacion = document.getElementById("presentacion").value.trim();
      let tiendaNueva = document.getElementById("tiendaNueva").value;
      let precioNuevo = parseFloat(document.getElementById("precioNuevo").value);

      if (!nombre || !presentacion || isNaN(precioNuevo) || precioNuevo < 0) {
        alert("Por favor llena todos los campos correctamente.");
        return;
      }

      productos[codigo] = { nombre, presentacion, precioAnterior: precioNuevo, tienda: tiendaNueva };
      guardarLocal();
      alert("¡Producto guardado exitosamente!");
      buscarProducto(codigo);
    }

    function resetCarrito() {
      totalCarrito = 0;
      detalle = [];
      
      actualizarCarrito();
      guardarCarritoLocal();
      
      alert("Carrito restablecido.");
    }

    function exportarCSV() {
      let csvContent = "sep=,\ncodigo,nombre,presentacion,precioAnterior,tienda\n";
      for (const codigo in productos) {
        let p = productos[codigo];
        csvContent += `"${codigo}","${p.nombre}","${p.presentacion}",${p.precioAnterior},"${p.tienda || ''}"\n`;
      }
      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.setAttribute("href", url);
      link.setAttribute("download", "base_de_productos.csv");
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function importarCSV() {
      const fileInput = document.getElementById('archivoCSV');
      const file = fileInput.files;
      
      if (!file) {
        alert("Por favor, selecciona un archivo CSV primero.");
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const contenido = e.target.result;
        const lineas = contenido.split("\n");
        let importados = 0;
        
        for (let i = 0; i < lineas.length; i++) {
          let linea = lineas[i].trim();
          
          if (!linea || linea.startsWith("sep=") || linea.startsWith("codigo,nombre")) {
            continue;
          }
          
          let columnas = linea.split(",").map(val => val.replace(/^"|"$/g, ''));
          
          if (columnas.length >= 4) {
            let codigo = columnas[0];
            let nombre = columnas[1];
            let presentacion = columnas[2];
            let precioAnterior = parseFloat(columnas[3]);
            let tienda = columnas[4] || "Desconocida";

            if (codigo && nombre && !isNaN(precioAnterior)) {
              productos[codigo] = { nombre, presentacion, precioAnterior, tienda };
              importados++;
            }
          }
        }
        
        if (importados > 0) {
          guardarLocal();
          alert(`¡Éxito! Se han importado/actualizado ${importados} productos.`);
          location.reload(); 
        } else {
          alert("No se encontraron registros válidos.");
        }
      };
      reader.readAsText(file);
    }

    // 📷 FUNCIONES DE LA CÁMARA
    function toggleCamara() {
      const lectorDiv = document.getElementById("lector-qr");
      const btn = document.getElementById("btnToggleCamara");

      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("lector-qr");
      }

      if (lectorDiv.style.display === "none" || lectorDiv.style.display === "") {
        lectorDiv.style.display = "block";
        btn.textContent = "❌ Cerrar Cámara";
        btn.style.backgroundColor = "#e74c3c";

        // Iniciar el lector apuntando a la cámara trasera (environment)
        html5QrCode.start(
          { facingMode: "environment" }, 
          {
            fps: 10,  // Cuadros por segundo para procesar
            qrbox: { width: 250, height: 150 } // Cuadro de enfoque en la pantalla
          },
          onScanSuccess,
          onScanFailure
        ).catch(err => {
          alert("Error al acceder a la cámara. Asegúrate de dar permisos.");
          cerrarCamara();
          console.error(err);
        });
      } else {
        cerrarCamara();
      }
    }

    function cerrarCamara() {
      const lectorDiv = document.getElementById("lector-qr");
      const btn = document.getElementById("btnToggleCamara");
      
      lectorDiv.style.display = "none";
      btn.textContent = "📷 Abrir Cámara";
      btn.style.backgroundColor = "#2ecc71";

      if (html5QrCode) {
        html5QrCode.stop().catch(err => console.error("Error al detener cámara:", err));
      }
    }

    function onScanSuccess(decodedText, decodedResult) {
      // Al escanear con éxito un código
      document.getElementById("codigoManual").value = decodedText;
      
      // Vibrar el celular ligeramente si el navegador lo permite
      if (navigator.vibrate) {
        navigator.vibrate(200);
      }

      // Detener cámara y buscar el producto de inmediato
      cerrarCamara();
      buscarProducto(decodedText);
    }

    function onScanFailure(error) {
      // Ignoramos los fallos por cada cuadro de video donde no encuentra códigos
    }
  </script>
</body>
</html>
